<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Open Account</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<header>

<div class="logo">
ABC BANK
</div>

<nav>

<a href="index.html">Home</a>

<a href="login.html">Login</a>

<a href="contact.html">Contact</a>

</nav>

</header>

<div class="form-container">

<h2>Create New Account</h2>

<form onsubmit="return registerUser()">

<input
type="text"
id="fullname"
placeholder="Full Name"
required>

<input
type="email"
id="email"
placeholder="Email"
required>

<input
type="text"
id="mobile"
placeholder="Mobile Number"
required>

<input
type="text"
id="address"
placeholder="Address"
required>

<input
type="password"
id="newpassword"
placeholder="Create Password"
required>

<button type="submit">

Create Account

</button>

</form>

</div>

<script src="script.js"></script>

</body>

</html>
